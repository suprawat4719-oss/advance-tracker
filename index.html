<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>เบิกล่วงหน้า</title><style>:root{--navy:#0D1B2A;--blue:#1A6FA0;--green:#16A34A;--green-bg:#DCFCE7;--red:#DC2626;--red-bg:#FEE2E2;--gray:#6B7280;--border:#E5E7EB;--shadow:0 2px 12px rgba(0,0,0,.08)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:sans-serif;background:#F0F4F8;color:var(--navy)}.hdr{background:var(--navy);padding:14px 16px;display:flex;align-items:center;position:sticky;top:0;z-index:99}.hdr h1{color:#fff;font-size:17px;flex:1}.hdr .badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.1);color:#94A3B8}.hdr .badge.on{background:rgba(22,163,74,.2);color:#4ADE80}.tabs{background:#fff;display:flex;border-bottom:2px solid var(--border);position:sticky;top:50px;z-index:98}.tb{flex:1;padding:11px 4px;border:none;background:none;font-size:12px;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}.tb.on{color:var(--blue);border-bottom-color:var(--blue)}.pg{display:none;padding:14px}.pg.on{display:block}.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}.row{display:flex;align-items:center;gap:10px;margin-bottom:12px}.row label{font-size:12px;color:var(--gray);white-space:nowrap}select,input[type=text],input[type=number]{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;width:100%;background:#fff}select:focus,input:focus{outline:none;border-color:var(--blue)}.sel{flex:1}.plus{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:20px;cursor:pointer;line-height:1}.emp-card{background:var(--navy);border-radius:12px;padding:16px;color:#fff;margin-bottom:12px}.emp-card .nm{font-size:15px;font-weight:600;margin-bottom:3px}.emp-card .sub{font-size:11px;color:#94A3B8;margin-bottom:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.fi label{font-size:11px;color:#94A3B8;display:block;margin-bottom:3px}.fi input{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:#fff}.sum2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.sbox{background:#fff;border-radius:12px;padding:12px;box-shadow:var(--shadow);text-align:center}.sbox .sl{font-size:11px;color:var(--gray);margin-bottom:3px}.sbox .sv{font-size:17px;font-weight:700}.obox{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between}.ov{font-size:20px;font-weight:700;padding:5px 14px;border-radius:8px}.ov.pos{color:var(--green);background:var(--green-bg)}.ov.neg{color:var(--red);background:var(--red-bg)}.txc{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}.txi{width:38px;height:38px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}.txinfo{flex:1;min-width:0}.txd{font-size:11px;color:var(--gray)}.txb{font-size:13px;font-weight:500}.txs{font-size:11px;color:var(--gray)}.txa{font-size:14px;font-weight:700;color:var(--blue);white-space:nowrap}.txr{font-size:10px;color:#CBD5E1}.del{background:none;border:none;color:#CBD5E1;font-size:17px;cursor:pointer;padding:4px}.del:hover{color:var(--red)}.uarea{border:2px dashed var(--border);border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;margin-bottom:12px;background:#fff}.uarea:hover{border-color:var(--blue);background:#EFF6FF}.uicon{font-size:44px;margin-bottom:10px}.prev{background:#fff;border-radius:10px;overflow:hidden;margin-bottom:12px;display:none}.prev img{width:100%;max-height:260px;object-fit:contain;background:#f8f8f8}.prev .pi{padding:10px 14px}.rcard{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;display:none}.rcard .rt{font-size:13px;font-weight:600;margin-bottom:10px}.rf{margin-bottom:9px}.rf label{font-size:11px;color:var(--gray);display:block;margin-bottom:2px}.lstate{background:#FEF3C7;border-radius:12px;padding:18px;text-align:center;margin-bottom:12px;display:none}.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 8px}@keyframes sp{to{transform:rotate(360deg)}}.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}.btn-g{background:var(--green);color:#fff}.btn-b{background:var(--blue);color:#fff}.btn-o{background:#fff;color:var(--blue);border:2px solid var(--blue)}.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}.mo.on{display:flex}.mbox{background:#fff;border-radius:18px 18px 0 0;padding:22px 18px 32px;width:100%;animation:su .3s ease}@keyframes su{from{transform:translateY(100%)}}.mbox h3{font-size:15px;font-weight:600;margin-bottom:14px}.mf{margin-bottom:11px}.mf label{font-size:11px;color:var(--gray);display:block;margin-bottom:3px}.mf input{border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:14px;width:100%}.empty{text-align:center;padding:28px 16px;color:var(--gray)}.empty .ei{font-size:38px;margin-bottom:8px}.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:9px 18px;border-radius:22px;font-size:12px;z-index:999;white-space:nowrap}.stitle{font-size:13px;font-weight:600;margin-bottom:8px}.expbox{background:#F3F4F6;border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px}.exprow{display:flex;justify-content:space-between;margin-bottom:5px}.exprow.last{border-top:1px solid var(--border);padding-top:7px;margin-top:5px}</style></head><body>
<div class="hdr"><div style="flex:1"><h1>💼 เบิกล่วงหน้า</h1><div style="color:#94A3B8;font-size:11px">ระบบบันทึกเบิกเงินล่วงหน้าพนักงาน</div></div><div class="badge" id="sb">⏳ กำลังเชื่อมต่อ...</div></div>
<div class="tabs"><button class="tb on" onclick="goTab('dashboard',this)">📊 สรุป</button><button class="tb" onclick="goTab('upload',this)">📸 อัพโหลดสลิป</button><button class="tb" onclick="goTab('export',this)">📤 ส่งออก</button></div>
<div class="pg on" id="pg-dashboard"><div class="card row" style="margin-bottom:12px"><label>พนักงาน</label><select class="sel" id="sel1" onchange="selEmp()"></select><button class="plus" onclick="openMo()">+</button></div><div id="dash"></div></div>
<div class="pg" id="pg-upload"><div class="card row" style="margin-bottom:12px"><label>บันทึกให้</label><select class="sel" id="sel2"></select></div><div class="uarea" onclick="document.getElementById('fi').click()"><div class="uicon">📷</div><div style="font-size:15px;font-weight:600;margin-bottom:4px">อัพโหลดสลิปโอนเงิน</div><div style="font-size:12px;color:var(--gray)">แตะเพื่อเลือกรูปสลิป</div></div><input type="file" id="fi" accept="image/*" onchange="onFile(this)" style="display:none"><div class="prev" id="prev"><img id="pimg" src="" alt="slip"><div class="pi"><span style="background:#DBEAFE;color:var(--blue);padding:2px 8px;border-radius:20px;font-size:11px">🖼️ ตรวจสอบรูปแล้ว</span></div></div><div class="lstate" id="ls"><div class="spin"></div><p style="font-weight:600">กำลังอ่านข้อมูลจากสลิป...</p></div><div class="rcard" id="rc"><div class="rt">✅ ข้อมูลจากสลิป — ตรวจสอบก่อนบันทึก</div><div class="rf"><label>วันที่โอน</label><input type="text" id="rd"></div><div class="rf"><label>ธนาคารผู้โอน</label><input type="text" id="rb"></div><div class="rf"><label>ผู้โอน</label><input type="text" id="rs"></div><div class="rf"><label>จำนวนเงิน (บาท)</label><input type="number" id="ra"></div><div class="rf"><label>เลขที่อ้างอิง</label><input type="text" id="rr"></div><button class="btn btn-g" onclick="saveTx()">💾 บันทึกรายการนี้</button><button class="btn btn-o" onclick="resetUp()">🔄 อัพโหลดใหม่</button></div></div>
<div class="pg" id="pg-export"><div class="card row" style="margin-bottom:12px"><label>พนักงาน</label><select class="sel" id="sel3" onchange="renderExp()"></select></div><div id="expbox"><p style="color:var(--gray);font-size:13px">เลือกพนักงานเพื่อส่งออกข้อมูล</p></div></div>
<div class="mo" id="mo"><div class="mbox"><h3>➕ เพิ่มพนักงาน</h3><div class="mf"><label>ชื่อ-นามสกุล</label><input type="text" id="mn" placeholder="เช่น นายประจวบ ศิธรกุล"></div><div class="mf"><label>ธนาคาร / เลขบัญชี</label><input type="text" id="mk" placeholder="เช่น KTB / 092-xxx-0476"></div><div class="mf"><label>เงินเดือน (บาท)</label><input type="number" id="ms" placeholder="0"></div><div class="mf"><label>ยอดยกมาจากเดือนก่อน (บาท)</label><input type="number" id="mc" placeholder="0"></div><button class="btn btn-b" onclick="saveEmp()" style="margin-top:8px">บันทึก</button><button class="btn btn-o" onclick="closeMo()">ยกเลิก</button></div></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyDgjfoPXa9hWIypcUKsGq7-2EP5FvGB3iM",authDomain:"advance-tracker-cadf5.firebaseapp.com",projectId:"advance-tracker-cadf5",storageBucket:"advance-tracker-cadf5.firebasestorage.app",messagingSenderId:"186461314782",appId:"1:186461314782:web:552ad245c22d36a53cac4f"});
var db=firebase.firestore(),emps=[],curId=null,imgB64=null;
function setSB(on){var b=document.getElementById('sb');b.textContent=on?'🟢 เชื่อมต่อแล้ว':'🔴 ออฟไลน์';b.className='badge'+(on?' on':'');}
async function loadEmps(){try{var s=await db.collection('employees').get();emps=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});setSB(true);if(!curId&&emps.length>0)curId=emps[0].id;refSel();renderDash();}catch(e){setSB(false);document.getElementById('dash').innerHTML='<div class="empty"><div class="ei">❌</div><p>เชื่อมต่อไม่ได้<br>กรุณาเปิดในเบราว์เซอร์</p></div>';}}
function goTab(t,btn){document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});document.getElementById('pg-'+t).classList.add('on');if(btn)btn.classList.add('on');if(t==='export')renderExp();}
function refSel(){['sel1','sel2','sel3'].forEach(function(id){var el=document.getElementById(id);if(!el)return;el.innerHTML=emps.length===0?'<option value="">-- ยังไม่มีพนักงาน --</option>':emps.map(function(e){return'<option value="'+e.id+'"'+(e.id===curId?' selected':'')+'>'+e.name+'</option>';}).join('');});}
function selEmp(){curId=document.getElementById('sel1').value;renderDash();}
function openMo(){document.getElementById('mo').classList.add('on');document.getElementById('mn').focus();}
function closeMo(){document.getElementById('mo').classList.remove('on');}
async function saveEmp(){var n=document.getElementById('mn').value.trim();var k=document.getElementById('mk').value.trim();var s=parseFloat(document.getElementById('ms').value)||0;var c=parseFloat(document.getElementById('mc').value)||0;if(!n){toast('กรุณากรอกชื่อพนักงาน');return;}try{var r=await db.collection('employees').add({name:n,bank:k,salary:s,carry:c,transactions:[]});curId=r.id;await loadEmps();closeMo();['mn','mk','ms','mc'].forEach(function(id){document.getElementById(id).value='';});toast('✅ เพิ่มพนักงานเรียบร้อย');}catch(e){toast('❌ บันทึกไม่สำเร็จ');}}
function getEmp(){return emps.find(function(e){return e.id===curId;});}
function renderDash(){var emp=getEmp(),c=document.getElementById('dash');if(!emp){c.innerHTML='<div class="empty"><div class="ei">👤</div><p>เพิ่มพนักงานก่อนเริ่มใช้งาน</p></div>';return;}var tx=emp.transactions||[];var tot=tx.reduce(function(s,t){return s+t.amount;},0);var out=(emp.salary||0)-(emp.carry||0)-tot;var pos=out>=0;var txH=tx.length===0?'<div class="empty"><div class="ei">📭</div><p>ยังไม่มีรายการเบิก</p></div>':tx.map(function(t,i){return'<div class="txc"><div class="txi">🏦</div><div class="txinfo"><div class="txd">'+t.date+'</div><div class="txb">'+t.bank+'</div><div class="txs">'+t.sender+'</div><div class="txr">'+(t.ref||'')+'</div></div><div><div class="txa">฿'+t.amount.toLocaleString('th-TH',{minimumFractionDigits:2})+'</div><button class="del" onclick="delTx('+i+')">🗑️</button></div></div>';}).join('');c.innerHTML='<div class="emp-card"><div class="nm">'+emp.name+'</div><div class="sub">'+(emp.bank||'')+'</div><div class="grid2"><div class="fi"><label>ฐานเงินเดือน (บาท)</label><input type="number" value="'+(emp.salary||'')+'" placeholder="กรอกเงินเดือน" onchange="updSalary(this.value)"></div><div class="fi"><label>ยกมาเดือนก่อน (บาท)</label><input type="number" value="'+(emp.carry||'')+'" placeholder="0" onchange="updCarry(this.value)"></div></div></div><div class="sum2"><div class="sbox"><div class="sl">รวมเบิกเดือนนี้</div><div class="sv" style="color:var(--blue)">฿'+tot.toLocaleString('th-TH',{minimumFractionDigits:2})+'</div></div><div class="sbox"><div class="sl">จำนวนรายการ</div><div class="sv">'+tx.length+' รายการ</div></div></div><div class="obox"><div><div style="font-size:13px;color:var(--gray)">ยอดคงค้าง</div><div style="font-size:11px;color:var(--gray)">เงินเดือน − ยกมา − เบิกเดือนนี้</div></div><div class="ov '+(pos?'pos':'neg')+'">'+(pos?'+':'')+'฿'+out.toLocaleString('th-TH',{minimumFractionDigits:2})+'</div></div><div class="stitle">📋 รายการเบิกล่วงหน้า</div>'+txH;}
async function updSalary(v){var e=getEmp();if(!e)return;await db.collection('employees').doc(e.id).update({salary:parseFloat(v)||0});await loadEmps();}
async function updCarry(v){var e=getEmp();if(!e)return;await db.collection('employees').doc(e.id).update({carry:parseFloat(v)||0});await loadEmps();}
async function delTx(i){var e=getEmp();if(!e||!confirm('ลบรายการนี้?'))return;var tx=[].concat(e.transactions||[]);tx.splice(i,1);await db.collection('employees').doc(e.id).update({transactions:tx});await loadEmps();toast('🗑️ ลบรายการแล้ว');}
function onFile(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){imgB64=e.target.result.split(',')[1];document.getElementById('pimg').src=e.target.result;document.getElementById('prev').style.display='block';document.getElementById('rc').style.display='none';analyzeSlip();};r.readAsDataURL(f);}
async function analyzeSlip(){document.getElementById('ls').style.display='block';document.getElementById('rc').style.display='none';try{var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:'อ่านสลิปโอนเงินไทย ตอบ JSON เท่านั้น ไม่มี markdown: {"date":"","bank":"","sender":"","amount":0,"ref":""}',messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgB64}},{type:'text',text:'อ่านสลิปนี้'}]}]})});var data=await res.json();var txt=data.content.map(function(c){return c.text||'';}).join('').replace(/```json|```/g,'').trim();var p=JSON.parse(txt);document.getElementById('rd').value=p.date||'';document.getElementById('rb').value=p.bank||'';document.getElementById('rs').value=p.sender||'';document.getElementById('ra').value=p.amount||'';document.getElementById('rr').value=p.ref||'';}catch(e){toast('⚠️ อ่านไม่ได้ กรุณากรอกเอง');}document.getElementById('ls').style.display='none';document.getElementById('rc').style.display='block';}
async function saveTx(){var eid=document.getElementById('sel2').value;var emp=emps.find(function(e){return e.id===eid;});if(!emp){toast('กรุณาเลือกพนักงานก่อน');return;}var amt=parseFloat(document.getElementById('ra').value);if(!amt||amt<=0){toast('กรุณากรอกจำนวนเงิน');return;}var tx={date:document.getElementById('rd').value||'-',bank:document.getElementById('rb').value||'-',sender:document.getElementById('rs').value||'-',amount:amt,ref:document.getElementById('rr').value||'',savedAt:new Date().toISOString()};try{var list=[].concat(emp.transactions||[]);list.push(tx);await db.collection('employees').doc(eid).update({transactions:list});curId=eid;await loadEmps();resetUp();toast('✅ บันทึก ฿'+amt.toLocaleString('th-TH')+' สำเร็จ');goTab('dashboard',document.querySelectorAll('.tb')[0]);}catch(e){toast('❌ บันทึกไม่สำเร็จ');}}
function resetUp(){imgB64=null;document.getElementById('fi').value='';document.getElementById('prev').style.display='none';document.getElementById('rc').style.display='none';document.getElementById('ls').style.display='none';}
function renderExp(){var eid=document.getElementById('sel3').value;var emp=emps.find(function(e){return e.id===eid;});var c=document.getElementById('expbox');if(!emp){c.innerHTML='<p style="color:var(--gray);font-size:13px">เลือกพนักงานเพื่อส่งออกข้อมูล</p>';return;}var tx=emp.transactions||[];var tot=tx.reduce(function(s,t){return s+t.amount;},0);var out=(emp.salary||0)-(emp.carry||0)-tot;c.innerHTML='<div class="stitle">📊 '+emp.name+'</div><div class="expbox"><div class="exprow"><span style="color:var(--gray)">เงินเดือน</span><span style="font-weight:600">฿'+(emp.salary||0).toLocaleString('th-TH',{minimumFractionDigits:2})+'</span></div><div class="exprow"><span style="color:var(--gray)">ยกมาเดือนก่อน</span><span style="font-weight:600">฿'+(emp.carry||0).toLocaleString('th-TH',{minimumFractionDigits:2})+'</span></div><div class="exprow"><span style="color:var(--gray)">รวมเบิกเดือนนี้</span><span style="font-weight:600;color:var(--blue)">฿'+tot.toLocaleString('th-TH',{minimumFractionDigits:2})+'</span></div><div class="exprow last"><span style="font-weight:600">ยอดคงค้าง</span><span style="font-weight:700;color:'+(out>=0?'var(--green)':'var(--red)')+';">'+(out>=0?'+':'')+'฿'+out.toLocaleString('th-TH',{minimumFractionDigits:2})+'</span></div></div><button class="btn btn-b" onclick="expCSV(\''+eid+'\')">📥 ดาวน์โหลด CSV</button><button class="btn btn-o" onclick="cpTxt(\''+eid+'\')" style="margin-top:8px">📋 คัดลอกข้อความ</button>';}
function expCSV(eid){var emp=emps.find(function(e){return e.id===eid;});if(!emp)return;var tx=emp.transactions||[];var rows=[['#','วันที่โอน','ธนาคาร','ผู้โอน','จำนวนเงิน','เลขอ้างอิง']].concat(tx.map(function(t,i){return[i+1,t.date,t.bank,t.sender,t.amount,t.ref];}));var csv=rows.map(function(r){return r.join(',');}).join('\n');var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download='เบิกล่วงหน้า_'+emp.name+'.csv';a.click();}
function cpTxt(eid){var emp=emps.find(function(e){return e.id===eid;});if(!emp)return;var tx=emp.transactions||[];var tot=tx.reduce(function(s,t){return s+t.amount;},0);var out=(emp.salary||0)-(emp.carry||0)-tot;var t='รายการเบิกล่วงหน้า — '+emp.name+'\n'+'='.repeat(34)+'\n';tx.forEach(function(x,i){t+=(i+1)+'. '+x.date+' | '+x.bank+' | ฿'+x.amount.toLocaleString('th-TH')+'\n';});t+='='.repeat(34)+'\nรวมเบิก: ฿'+tot.toLocaleString('th-TH')+'\nยอดคงค้าง: '+(out>=0?'+':'')+'฿'+out.toLocaleString('th-TH')+'\n';navigator.clipboard.writeText(t).then(function(){toast('📋 คัดลอกแล้ว');});}
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},2500);}
loadEmps();
</script></body></html>
