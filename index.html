<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>เบิกล่วงหน้า</title>
<style>
:root{--navy:#0D1B2A;--blue:#1A6FA0;--green:#16A34A;--green-bg:#DCFCE7;--red:#DC2626;--red-bg:#FEE2E2;--gray:#6B7280;--border:#E5E7EB;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#F0F4F8;color:var(--navy)}
.hdr{background:var(--navy);padding:14px 16px;display:flex;align-items:center;position:sticky;top:0;z-index:99}
.hdr h1{color:#fff;font-size:17px;flex:1}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.1);color:#94A3B8}
.badge.on{background:rgba(22,163,74,.2);color:#4ADE80}
.badge.local{background:rgba(245,158,11,.2);color:#FCD34D}
.noti{padding:8px 14px;font-size:12px;text-align:center;display:none}
.noti.warn{background:#FEF3C7;color:#92400E;display:block}
.tabs{background:#fff;display:flex;border-bottom:2px solid var(--border);position:sticky;top:50px;z-index:98}
.tb{flex:1;padding:11px 4px;border:none;background:none;font-size:12px;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tb.on{color:var(--blue);border-bottom-color:var(--blue)}
.pg{display:none;padding:14px}.pg.on{display:block}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.row label{font-size:12px;color:var(--gray);white-space:nowrap}
select,input[type=text],input[type=number]{border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;width:100%;background:#fff}
select:focus,input:focus{outline:none;border-color:var(--blue)}
.sel{flex:1}
.plus{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:20px;cursor:pointer;line-height:1}
.emp-card{background:var(--navy);border-radius:12px;padding:16px;color:#fff;margin-bottom:12px}
.emp-card .nm{font-size:15px;font-weight:600;margin-bottom:3px}
.emp-card .sub{font-size:11px;color:#94A3B8;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fi label{font-size:11px;color:#94A3B8;display:block;margin-bottom:3px}
.fi input{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:#fff}
.sum2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sbox{background:#fff;border-radius:12px;padding:12px;box-shadow:var(--shadow);text-align:center}
.sbox .sl{font-size:11px;color:var(--gray);margin-bottom:3px}
.sbox .sv{font-size:17px;font-weight:700}
.obox{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between}
.ov{font-size:20px;font-weight:700;padding:5px 14px;border-radius:8px}
.ov.pos{color:var(--green);background:var(--green-bg)}
.ov.neg{color:var(--red);background:var(--red-bg)}
.txc{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px}
.txi{width:38px;height:38px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.txinfo{flex:1;min-width:0}
.txd{font-size:11px;color:var(--gray)}.txb{font-size:13px;font-weight:500}.txs{font-size:11px;color:var(--gray)}
.txa{font-size:14px;font-weight:700;color:var(--blue);white-space:nowrap}
.txr{font-size:10px;color:#CBD5E1}
.del{background:none;border:none;color:#CBD5E1;font-size:17px;cursor:pointer;padding:4px}
.del:hover{color:var(--red)}
.uarea{border:2px dashed var(--border);border-radius:14px;padding:28px 16px;text-align:center;cursor:pointer;margin-bottom:12px;background:#fff}
.uarea:hover{border-color:var(--blue);background:#EFF6FF}
.uicon{font-size:44px;margin-bottom:10px}
.prev{background:#fff;border-radius:10px;overflow:hidden;margin-bottom:12px;display:none}
.prev img{width:100%;max-height:260px;object-fit:contain;background:#f8f8f8}
.prev .pi{padding:10px 14px}
.rcard{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;display:none}
.rcard .rt{font-size:13px;font-weight:600;margin-bottom:10px}
.rf{margin-bottom:9px}.rf label{font-size:11px;color:var(--gray);display:block;margin-bottom:2px}
.lstate{background:#FEF3C7;border-radius:12px;padding:18px;text-align:center;margin-bottom:12px;display:none}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-g{background:var(--green);color:#fff}
.btn-b{background:var(--blue);color:#fff}
.btn-o{background:#fff;color:var(--blue);border:2px solid var(--blue)}
.btn-y{background:#F59E0B;color:#fff}
.btn-p{background:#7C3AED;color:#fff}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;overflow-y:auto}
.mo.on{display:flex}
.mbox{background:#fff;border-radius:18px 18px 0 0;padding:22px 18px 32px;width:100%;animation:su .3s ease;margin-top:auto}
@keyframes su{from{transform:translateY(100%)}}
.mbox h3{font-size:15px;font-weight:600;margin-bottom:14px}
.mf{margin-bottom:11px}.mf label{font-size:11px;color:var(--gray);display:block;margin-bottom:3px}
.mf input{border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:14px;width:100%}
.empty{text-align:center;padding:28px 16px;color:var(--gray)}
.empty .ei{font-size:38px;margin-bottom:8px}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:9px 18px;border-radius:22px;font-size:12px;z-index:999;white-space:nowrap}
.stitle{font-size:13px;font-weight:600;margin-bottom:8px}
.sec-title{font-size:12px;font-weight:600;color:var(--gray);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.expbox{background:#F3F4F6;border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px}
.exprow{display:flex;justify-content:space-between;margin-bottom:5px}
.exprow.last{border-top:1px solid var(--border);padding-top:7px;margin-top:5px}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
/* extra income/deduct section in emp card */
.xsec{background:rgba(255,255,255,.06);border-radius:10px;padding:12px;margin-top:10px}
.xsec .xt{font-size:11px;color:#94A3B8;margin-bottom:8px;font-weight:600}
.xgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.xfi label{font-size:11px;color:#94A3B8;display:block;margin-bottom:2px}
.xfi input{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:8px;padding:7px 9px;font-size:13px;width:100%;color:#fff}
.xfi input:focus{outline:none;border-color:rgba(255,255,255,.4)}
.xfi.full{grid-column:1/-1}
</style>
</head>
<body>

<div class="hdr">
  <div style="flex:1"><h1>💼 เบิกล่วงหน้า</h1><div style="color:#94A3B8;font-size:11px">ระบบบันทึกเบิกเงินล่วงหน้าพนักงาน</div></div>
  <div class="badge" id="sb">⏳ กำลังโหลด...</div>
</div>
<div class="noti" id="noti"></div>

<div class="tabs">
  <button class="tb on" onclick="goTab('dashboard',this)">📊 สรุป</button>
  <button class="tb" onclick="goTab('upload',this)">📸 อัพโหลดสลิป</button>
  <button class="tb" onclick="goTab('export',this)">📤 ส่งออก</button>
</div>

<!-- DASHBOARD -->
<div class="pg on" id="pg-dashboard">
  <div class="card row" style="margin-bottom:12px">
    <label>พนักงาน</label>
    <select class="sel" id="sel1" onchange="selEmp()"></select>
    <button class="plus" onclick="openMo()">+</button>
  </div>
  <div id="dash"></div>
</div>

<!-- UPLOAD -->
<div class="pg" id="pg-upload">
  <div class="card row" style="margin-bottom:12px">
    <label>บันทึกให้</label>
    <select class="sel" id="sel2"></select>
  </div>
  <div class="uarea" onclick="document.getElementById('fi').click()">
    <div class="uicon">📷</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:4px">อัพโหลดสลิปโอนเงิน</div>
    <div style="font-size:12px;color:var(--gray)">แตะเพื่อเลือกรูปสลิป</div>
  </div>
  <input type="file" id="fi" accept="image/*" onchange="onFile(this)" style="display:none">
  <div class="prev" id="prev"><img id="pimg" src="" alt="slip"><div class="pi"><span style="background:#DBEAFE;color:var(--blue);padding:2px 8px;border-radius:20px;font-size:11px">🖼️ ตรวจสอบรูปแล้ว</span></div></div>
  <div class="lstate" id="ls"><div class="spin"></div><p style="font-weight:600">กำลังอ่านข้อมูลจากสลิป...</p></div>
  <div class="rcard" id="rc">
    <div class="rt">✅ ข้อมูลจากสลิป — ตรวจสอบก่อนบันทึก</div>
    <div class="rf"><label>วันที่โอน</label><input type="text" id="rd"></div>
    <div class="rf"><label>ธนาคารผู้โอน</label><input type="text" id="rb"></div>
    <div class="rf"><label>ผู้รับโอน</label><input type="text" id="rp" placeholder="ชื่อผู้รับโอนจากสลิป"></div>
    <div class="rf"><label>จำนวนเงิน (บาท)</label><input type="number" id="ra"></div>
    <div class="rf"><label>เลขที่อ้างอิง</label><input type="text" id="rr"></div>
    <div class="rf"><label>ลิงก์รูปสลิป (Google Drive)</label><input type="text" id="rl" placeholder="วางลิงก์ Google Drive ที่นี่"></div>
    <button class="btn btn-g" onclick="saveTx()">💾 บันทึกรายการนี้</button>
    <button class="btn btn-o" onclick="resetUp()">🔄 อัพโหลดใหม่</button>
  </div>
</div>

<!-- EXPORT -->
<div class="pg" id="pg-export">
  <div class="card row" style="margin-bottom:12px">
    <label>พนักงาน</label>
    <select class="sel" id="sel3" onchange="renderExp()"></select>
  </div>
  <div id="expbox"><p style="color:var(--gray);font-size:13px">เลือกพนักงานเพื่อส่งออกข้อมูล</p></div>
  <hr class="divider">
  <button class="btn btn-p" onclick="printSlip()">📄 ออกสลิปเงินเดือน PDF</button>
  <button class="btn btn-y" onclick="syncDown()">🔄 ดึงข้อมูลจาก Firebase ลงเครื่อง</button>
  <button class="btn btn-o" onclick="setApiKey()">🔑 ตั้งค่า API Key</button>
</div>

<!-- MODAL เพิ่มพนักงาน -->
<div class="mo" id="mo">
  <div class="mbox">
    <h3>➕ เพิ่มพนักงาน</h3>
    <div class="mf"><label>ชื่อ-นามสกุล</label><input type="text" id="mn" placeholder="เช่น นายประจวบ ศิธรกุล"></div>
    <div class="mf"><label>ธนาคาร / เลขบัญชี</label><input type="text" id="mk" placeholder="เช่น KTB / 092-xxx-0476"></div>
    <div class="mf"><label>เงินเดือน (บาท)</label><input type="number" id="ms" placeholder="0"></div>
    <div class="mf"><label>ยอดยกมาจากเดือนก่อน (บาท)</label><input type="number" id="mc" placeholder="0"></div>
    <button class="btn btn-b" onclick="saveEmp()" style="margin-top:8px">บันทึก</button>
    <button class="btn btn-o" onclick="closeMo()">ยกเลิก</button>
  </div>
</div>

<script>
var db, emps=[], curId=null, imgB64=null, isOnline=false;
var LOCAL_KEY='advance_tracker_v2';

function loadFirestore(){
  var s2=document.createElement('script');
  s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js';
  s2.onload=function(){
    firebase.initializeApp({
      apiKey:"AIzaSyDgjfoPXa9hWIypcUKsGq7-2EP5FvGB3iM",
      authDomain:"advance-tracker-cadf5.firebaseapp.com",
      projectId:"advance-tracker-cadf5",
      storageBucket:"advance-tracker-cadf5.firebasestorage.app",
      messagingSenderId:"186461314782",
      appId:"1:186461314782:web:552ad245c22d36a53cac4f"
    });
    db=firebase.firestore();
    loadEmps();
  };
  document.head.appendChild(s2);
}
(function(){
  var s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s1.onload=loadFirestore;
  document.head.appendChild(s1);
})();

function saveLocal(){try{localStorage.setItem(LOCAL_KEY,JSON.stringify(emps));}catch(e){}}
function loadLocal(){try{var d=localStorage.getItem(LOCAL_KEY);if(d)emps=JSON.parse(d);}catch(e){emps=[];}}

function setSB(mode){
  var b=document.getElementById('sb'),n=document.getElementById('noti');
  if(mode==='online'){b.textContent='🟢 ออนไลน์';b.className='badge on';n.className='noti';}
  else if(mode==='offline'){b.textContent='🟡 ออฟไลน์';b.className='badge local';n.className='noti warn';n.textContent='⚠️ ไม่มีอินเทอร์เน็ต — ใช้ข้อมูลในเครื่อง บันทึกได้ตามปกติ';}
  else{b.textContent='⏳ กำลังโหลด...';b.className='badge';n.className='noti';}
}

async function loadEmps(){
  loadLocal();
  if(emps.length>0){if(!curId)curId=emps[0].id;refSel();renderDash();}
  try{
    var s=await db.collection('employees').get();
    emps=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    saveLocal();isOnline=true;setSB('online');
    if(!curId&&emps.length>0)curId=emps[0].id;
    refSel();renderDash();
  }catch(e){
    isOnline=false;setSB('offline');
    if(emps.length===0)document.getElementById('dash').innerHTML='<div class="empty"><div class="ei">📭</div><p>ยังไม่มีข้อมูล</p></div>';
  }
}

async function syncDown(){
  toast('🔄 กำลังดึงข้อมูลจาก Firebase...');
  try{
    var s=await db.collection('employees').get();
    emps=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    saveLocal();isOnline=true;setSB('online');
    if(!curId&&emps.length>0)curId=emps[0].id;
    refSel();renderDash();renderExp();
    toast('✅ ดึงข้อมูลสำเร็จ — บันทึกในเครื่องแล้ว');
  }catch(e){toast('❌ ไม่สามารถเชื่อมต่อ Firebase ได้');}
}

async function saveToFirebase(id,data){
  if(isOnline){try{await db.collection('employees').doc(id).update(data);return true;}catch(e){isOnline=false;setSB('offline');return false;}}
  return false;
}

function setApiKey(){
  var k=prompt('กรอก Anthropic API Key:\n(เริ่มต้นด้วย sk-ant-)');
  if(k&&k.trim().startsWith('sk-ant-')){localStorage.setItem('anthropic_api_key',k.trim());toast('✅ บันทึก API Key เรียบร้อย');}
  else if(k){toast('❌ API Key ไม่ถูกต้อง');}
}

function goTab(t,btn){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('pg-'+t).classList.add('on');
  if(btn)btn.classList.add('on');
  if(t==='export')renderExp();
}

function refSel(){
  ['sel1','sel2','sel3'].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    el.innerHTML=emps.length===0?'<option value="">-- ยังไม่มีพนักงาน --</option>':
      emps.map(function(e){return'<option value="'+e.id+'"'+(e.id===curId?' selected':'')+'>'+e.name+'</option>';}).join('');
  });
}

function selEmp(){curId=document.getElementById('sel1').value;renderDash();}
function openMo(){document.getElementById('mo').classList.add('on');document.getElementById('mn').focus();}
function closeMo(){document.getElementById('mo').classList.remove('on');}

async function saveEmp(){
  var n=document.getElementById('mn').value.trim(),k=document.getElementById('mk').value.trim();
  var s=parseFloat(document.getElementById('ms').value)||0,c=parseFloat(document.getElementById('mc').value)||0;
  if(!n){toast('กรุณากรอกชื่อพนักงาน');return;}
  var newEmp={name:n,bank:k,salary:s,carry:c,extras:{ot:0,travel:0,phone:0,other:0},deducts:{absent:0,insurance:0,social:0},transactions:[]};
  try{
    if(isOnline){var r=await db.collection('employees').add(newEmp);newEmp.id=r.id;}
    else{newEmp.id='local_'+Date.now();toast('⚠️ บันทึกในเครื่องก่อน');}
    emps.push(newEmp);curId=newEmp.id;saveLocal();refSel();renderDash();closeMo();
    ['mn','mk','ms','mc'].forEach(function(id){document.getElementById(id).value='';});
    toast('✅ เพิ่มพนักงานเรียบร้อย');
  }catch(e){toast('❌ บันทึกไม่สำเร็จ');}
}

function getEmp(){return emps.find(function(e){return e.id===curId;});}

/* helper: อ่านค่า input ตัวเลขแล้ว clamp ไม่ให้ติดลบ */
function fv(id){return Math.max(0,parseFloat(document.getElementById(id).value)||0);}

/* บันทึก extras+deducts ลง emp แล้ว sync */
async function saveExtras(){
  var e=getEmp();if(!e)return;
  e.extras={ot:fv('x_ot'),travel:fv('x_travel'),phone:fv('x_phone'),other:fv('x_other')};
  e.deducts={absent:fv('d_absent'),insurance:fv('d_insurance'),social:fv('d_social')};
  saveLocal();
  await saveToFirebase(e.id,{extras:e.extras,deducts:e.deducts});
  renderDash();
  toast('✅ บันทึกรายได้/หักแล้ว');
}

function renderDash(){
  var emp=getEmp(),c=document.getElementById('dash');
  if(!emp){c.innerHTML='<div class="empty"><div class="ei">👤</div><p>เพิ่มพนักงานก่อนเริ่มใช้งาน</p></div>';return;}
  var tx=emp.transactions||[];
  var tot=tx.reduce(function(s,t){return s+t.amount;},0);
  var ex=emp.extras||{};var de=emp.deducts||{};
  var totalExtra=(ex.ot||0)+(ex.travel||0)+(ex.phone||0)+(ex.other||0);
  var totalDeduct=(de.absent||0)+(de.insurance||0)+(de.social||0);
  var net=(emp.salary||0)+totalExtra-totalDeduct-(emp.carry||0)-tot;
  var pos=net>=0;

  var txH=tx.length===0?'<div class="empty"><div class="ei">📭</div><p>ยังไม่มีรายการเบิก</p></div>':
    tx.map(function(t,i){
      return'<div class="txc"><div class="txi">🏦</div><div class="txinfo"><div class="txd">'+t.date+'</div><div class="txb">'+t.bank+'</div>'+(t.recipient?'<div class="txs">ผู้รับ: '+t.recipient+'</div>':'')+'<div class="txr">'+(t.ref||'')+'</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div class="txa">฿'+t.amount.toLocaleString('th-TH',{minimumFractionDigits:2})+'</div>'+(t.imgUrl?'<a href="'+t.imgUrl+'" target="_blank" style="font-size:11px;color:var(--blue);text-decoration:none">🖼️ ดูสลิป</a>':'')+'<button class="del" onclick="delTx('+i+')">🗑️</button></div></div>';
    }).join('');

  c.innerHTML=
    '<div class="emp-card">'+
      '<div class="nm">'+emp.name+'</div>'+
      '<div class="sub">'+(emp.bank||'')+'</div>'+
      '<div class="grid2">'+
        '<div class="fi"><label>ฐานเงินเดือน (บาท)</label><input type="number" value="'+(emp.salary||'')+'" placeholder="กรอกเงินเดือน" onchange="updSalary(this.value)"></div>'+
        '<div class="fi"><label>ยกมาเดือนก่อน (บาท)</label><input type="number" value="'+(emp.carry||'')+'" placeholder="0" onchange="updCarry(this.value)"></div>'+
      '</div>'+
      /* รายได้เพิ่มเติม */
      '<div class="xsec">'+

async function updSalary(v){var e=getEmp();if(!e)return;e.salary=parseFloat(v)||0;saveLocal();await saveToFirebase(e.id,{salary:e.salary});renderDash();}
async function updCarry(v){var e=getEmp();if(!e)return;e.carry=parseFloat(v)||0;saveLocal();await saveToFirebase(e.id,{carry:e.carry});renderDash();}

async function delTx(i){
  var e=getEmp();if(!e||!confirm('ลบรายการนี้?'))return;
  var tx=[].concat(e.transactions||[]);tx.splice(i,1);
  e.transactions=tx;saveLocal();await saveToFirebase(e.id,{transactions:tx});renderDash();toast('🗑️ ลบรายการแล้ว');
}

function onFile(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){imgB64=e.target.result.split(',')[1];document.getElementById('pimg').src=e.target.result;document.getElementById('prev').style.display='block';document.getElementById('rc').style.display='none';analyzeSlip();};
  r.readAsDataURL(f);
}

async function analyzeSlip(){
  var apiKey=localStorage.getItem('anthropic_api_key');
  if(!apiKey){setApiKey();apiKey=localStorage.getItem('anthropic_api_key');if(!apiKey){document.getElementById('rc').style.display='block';toast('⚠️ ไม่มี API Key กรุณากรอกเอง');return;}}
  document.getElementById('ls').style.display='block';document.getElementById('rc').style.display='none';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:500,system:'อ่านสลิปโอนเงินไทย ตอบ JSON เท่านั้น ไม่มี markdown: {"date":"","bank":"","recipient":"","amount":0,"ref":""}',messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgB64}},{type:'text',text:'อ่านสลิปนี้'}]}]})});
    var data=await res.json();
    if(data.error){localStorage.removeItem('anthropic_api_key');toast('❌ API Key ไม่ถูกต้อง');document.getElementById('ls').style.display='none';document.getElementById('rc').style.display='block';return;}
    var txt=data.content.map(function(c){return c.text||'';}).join('').replace(/```json|```/g,'').trim();
    var p=JSON.parse(txt);
    document.getElementById('rd').value=p.date||'';
    document.getElementById('rb').value=p.bank||'';
    document.getElementById('rp').value=p.recipient||'';
    document.getElementById('ra').value=p.amount||'';
    document.getElementById('rr').value=p.ref||'';
  }catch(e){toast('⚠️ อ่านไม่ได้ กรุณากรอกเอง');}
  document.getElementById('ls').style.display='none';document.getElementById('rc').style.display='block';
}

async function saveTx(){
  var eid=document.getElementById('sel2').value;
  var emp=emps.find(function(e){return e.id===eid;});
  if(!emp){toast('กรุณาเลือกพนักงานก่อน');return;}
  var amt=parseFloat(document.getElementById('ra').value);
  if(!amt||amt<=0){toast('กรุณากรอกจำนวนเงิน');return;}
  var tx={
    date:document.getElementById('rd').value||'-',
    bank:document.getElementById('rb').value||'-',
    recipient:document.getElementById('rp').value||'',
    amount:amt,
    ref:document.getElementById('rr').value||'',
    imgUrl:document.getElementById('rl').value||'',
    savedAt:new Date().toISOString()
  };
  var list=[].concat(emp.transactions||[]);list.push(tx);
  emp.transactions=list;saveLocal();
  var fbOk=await saveToFirebase(eid,{transactions:list});
  resetUp();curId=eid;refSel();renderDash();
  toast(fbOk?'✅ บันทึกสำเร็จ (ออนไลน์)':'✅ บันทึกในเครื่องแล้ว (ออฟไลน์)');
  goTab('dashboard',document.querySelectorAll('.tb')[0]);
}

function resetUp(){
  imgB64=null;
  document.getElementById('fi').value='';
  document.getElementById('rl').value='';
  document.getElementById('rp').value='';
  document.getElementById('prev').style.display='none';
  document.getElementById('rc').style.display='none';
  document.getElementById('ls').style.display='none';
}

function expCSV(eid){
  var emp=emps.find(function(e){return e.id===eid;});if(!emp)return;
  var tx=emp.transactions||[];
  var ex=emp.extras||{};var de=emp.deducts||{};
  var rows=[['#','วันที่โอน','ธนาคาร','ผู้รับโอน','จำนวนเงิน','เลขอ้างอิง','ลิงก์สลิป']].concat(
    tx.map(function(t,i){return[i+1,t.date,t.bank,t.recipient||'',t.amount,t.ref,t.imgUrl||''];}));
  rows.push([]);
  rows.push(['รายได้เพิ่ม','ค่าล่วงเวลา','ค่าเดินทาง','ค่าโทร','อื่นๆ']);
  rows.push(['',ex.ot||0,ex.travel||0,ex.phone||0,ex.other||0]);
  rows.push(['รายการหัก','ขาด/ลา/มาสาย','หักประกัน','ประกันสังคม']);
  rows.push(['',de.absent||0,de.insurance||0,de.social||0]);
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));a.download='เบิกล่วงหน้า_'+emp.name+'.csv';a.click();
}

function cpTxt(eid){
  var emp=emps.find(function(e){return e.id===eid;});if(!emp)return;
  var tx=emp.transactions||[];var ex=emp.extras||{};var de=emp.deducts||{};
  var tot=tx.reduce(function(s,t){return s+t.amount;},0);
  var totalExtra=(ex.ot||0)+(ex.travel||0)+(ex.phone||0)+(ex.other||0);
  var totalDeduct=(de.absent||0)+(de.insurance||0)+(de.social||0);
  var net=(emp.salary||0)+totalExtra-totalDeduct-(emp.carry||0)-tot;
  var t='รายการเบิกล่วงหน้า — '+emp.name+'\n'+'='.repeat(36)+'\n';
  tx.forEach(function(x,i){t+=(i+1)+'. '+x.date+' | '+x.bank+' | ผู้รับ: '+(x.recipient||'-')+' | ฿'+x.amount.toLocaleString('th-TH')+'\n';});
  t+='='.repeat(36)+'\n';
  t+='เงินเดือน: ฿'+(emp.salary||0).toLocaleString('th-TH')+'\n';
  if(totalExtra)t+='รายได้เพิ่ม: +฿'+totalExtra.toLocaleString('th-TH')+'\n';
  if(totalDeduct)t+='รายการหัก: -฿'+totalDeduct.toLocaleString('th-TH')+'\n';
  t+='รวมเบิก: ฿'+tot.toLocaleString('th-TH')+'\n';
  t+='ยอดสุทธิ: '+(net>=0?'+':'')+'฿'+net.toLocaleString('th-TH')+'\n';
  navigator.clipboard.writeText(t).then(function(){toast('📋 คัดลอกแล้ว');});
}

function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},2500);}
